# 是否开启调试模式
debug: true

# 监听端口
port: 8000

# 日志配置
log:
  # 是否保存日志
  save: false
  # 日志保存路径
  save_path: ./logs
  # 日志最大大小（KB，单日单分片；约 30MB）
  max_size: 30720
  # 日志最大保存天数
  max_age: 7

# SQL 日志配置
sql_log:
  # 是否开启 SQL 日志
  enable: false
  # 是否开启慢查询日志
  slow_query: false
  # 慢查询阈值（毫秒）
  slow_query_threshold: 400

# 跨域配置
cors:
  # 允许的域名
  allowed_origins:
    - "*"
  # 允许的请求方法
  allowed_methods:
    - "*"
  # 允许的请求头
  allowed_headers:
    - "*"
  # 是否允许凭证
  allow_credentials: true
  # 最大缓存时间（秒）
  max_age: 86400
  # 暴露的响应头
  expose_headers:
    - "*"

# 国际化配置
i18n:
  # 语言文件路径
  path: ./lang
  # 默认语言
  default_lang: zh-CN

